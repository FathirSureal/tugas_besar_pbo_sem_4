<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoYomi — Web Manga Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <header class="navbar">
        <div class="navbar-inner">
            <div class="logo" id="app-title" style="transition: color 0.2s;">
                <span class="logo-neo">Neo</span><span class="logo-yomi">Yomi</span>
            </div>

            <nav class="nav-tabs" id="menu-utama">
                <button id="btn-komik"   class="nav-tab active" onclick="ubahTipe('komik')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span>Komik</span>
                </button>
                <button id="btn-novel"   class="nav-tab" onclick="ubahTipe('novel')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <span>Novel</span>
                </button>
                <button id="btn-library" class="nav-tab" onclick="bukaHalamanLibrary()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span>Library</span>
                </button>
                <button id="btn-history" class="nav-tab" onclick="bukaHalamanHistory()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>History</span>
                </button>
                <button id="btn-downloaded" class="nav-tab" onclick="bukaHalamanDownloaded()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Downloaded</span>
                </button>
                <button id="btn-admin" class="nav-tab nav-tab--danger" onclick="bukaPanelAdmin()" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.41 14.2M4.93 19.07A10 10 0 0 1 3.52 4.87"/></svg>
                    <span>Admin</span>
                </button>
            </nav>

            <div id="area-akun" class="area-akun"></div>
        </div>
    </header>

    <!-- ===== HERO (hanya muncul di halaman awal) ===== -->
    <section class="hero" id="area-hero">
        <div class="hero-inner">
            <p class="hero-eyebrow">Baca tanpa batas</p>
            <h1 class="hero-headline">Manga, Manhwa, Manhua &amp; Novel — satu tempat.</h1>
            <p class="hero-sub">Ribuan ekstensi sumber konten, history otomatis, dan mode baca yang nyaman.</p>
        </div>
        <div class="hero-panels" aria-hidden="true">
            <div class="hero-panel hero-panel--1"></div>
            <div class="hero-panel hero-panel--2"><div class="hero-panel-glow"></div></div>
        </div>
        <div class="hero-fade"></div>
    </section>

    <!-- ===== FILTER TIPE ===== -->
    <div id="area-filter-tipe" style="display:none;">
        <div class="filter-bar">
            <span class="filter-label">Tipe</span>
            <div class="chips" id="chips-tipe">
                <button class="chip active" data-value="all"    onclick="setFilterTipe(this)">Semua</button>
                <button class="chip"        data-value="manga"  onclick="setFilterTipe(this)"><span class="chip-dot chip-dot--manga"></span>Manga</button>
                <button class="chip"        data-value="manhwa" onclick="setFilterTipe(this)"><span class="chip-dot chip-dot--manhwa"></span>Manhwa</button>
                <button class="chip"        data-value="manhua" onclick="setFilterTipe(this)"><span class="chip-dot chip-dot--manhua"></span>Manhua</button>
                <button class="chip"        data-value="comics" onclick="setFilterTipe(this)"><span class="chip-dot chip-dot--comics"></span>Comics</button>
            </div>
        </div>
        <div class="filter-bar" id="area-filter-genre" style="display:none;">
            <span class="filter-label">Genre</span>
            <div class="chips" id="chips-genre">
                <button class="chip active" data-value="all" onclick="setFilterGenre(this)">Semua Genre</button>
            </div>
        </div>
    </div>

    <!-- ===== SEARCH BAR ===== -->
    <div class="search-wrap" id="area-pencarian" style="display:none;">
        <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="input-keyword" class="search-input" placeholder="Cari judul... (Enter untuk cari)">
            <button class="search-btn" onclick="pemicuCariManga()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Cari
            </button>
        </div>
    </div>

    <!-- ===== FILTER BROWSE ===== -->
    <div id="area-filter-browse" style="display:none;">
        <div class="filter-bar">
            <span class="filter-label">Genre</span>
            <div class="chips" id="chips-browse-genre">
                <button class="chip active" data-value="all" onclick="setFilterBrowse(this)">Semua</button>
            </div>
        </div>
    </div>

    <!-- ===== KONTEN UTAMA ===== -->
    <main id="konten-dinamis">
        <div class="grid" id="rak-konten"></div>
    </main>

    <script>
        // ============================================================
        // STATE GLOBAL
        // ============================================================
        let tipeAktif           = 'komik';
        let dataMangaSaatIni    = {};
        let namaEkstensiAktif   = '';
        let filterBahasaAktif   = 'all';
        let filterTipeAktif     = 'all';
        let filterGenreAktif    = 'all';
        let filterBrowseAktif   = 'all';
        let malIdDetailAktif    = null;
        let dataBrowseSaatIni   = [];
        let statusLoginAktif    = { loggedIn: false, username: null, role: null };
        let mangaIdDetailAktif  = null;

        // ============================================================
        // STATE MESSAGE HELPER
        // ============================================================
        const ICON_LOADING = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';
        const ICON_EMPTY   = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';
        const ICON_ERROR   = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';

        function stateMsg(kind, text) {
            const icon = kind === 'error' ? ICON_ERROR : (kind === 'loading' ? ICON_LOADING : ICON_EMPTY);
            const cls  = kind === 'error' ? 'state-msg state-msg--error' : 'state-msg';
            return `<p class="${cls}">${icon}${text}</p>`;
        }

        // ============================================================
        // 1. DAFTAR EKSTENSI
        // ============================================================
        function ubahTipe(tipeBaru) {
            tipeAktif = tipeBaru;
            document.getElementById('btn-komik').classList.toggle('active',   tipeBaru === 'komik');
            document.getElementById('btn-novel').classList.toggle('active',   tipeBaru === 'novel');
            document.getElementById('btn-library').classList.remove('active');
            document.getElementById('btn-history').classList.remove('active');
            document.getElementById('btn-downloaded').classList.remove('active');

            document.getElementById('menu-utama').style.display         = 'flex';
            document.getElementById('area-pencarian').style.display     = 'none';
            document.getElementById('area-filter-browse').style.display = 'none';
            document.getElementById('area-filter-tipe').style.display   = (tipeBaru === 'komik') ? 'block' : 'none';

            // Tampilkan hero jika pertama kali
            document.getElementById('area-hero').style.display = 'block';

            const headerTitle = document.getElementById('app-title');
            headerTitle.innerHTML = '<span class="logo-neo">Neo</span><span class="logo-yomi">Yomi</span>';
            headerTitle.style.cursor = 'default';
            headerTitle.onclick      = null;

            document.getElementById('konten-dinamis').innerHTML = '<div class="grid" id="rak-konten"></div>';

            filterTipeAktif  = 'all';
            filterGenreAktif = 'all';
            resetChips('chips-tipe');
            resetChips('chips-genre');

            muatDaftarEkstensi();
        }

        function resetChips(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.querySelectorAll('.chip').forEach(c => {
                c.classList.toggle('active', c.dataset.value === 'all');
            });
        }

        function muatDaftarEkstensi() {
            const rak = document.getElementById('rak-konten');
            if (!rak) return;
            rak.innerHTML = stateMsg('loading', 'Memuat ekstensi...');

            let url = `api/${tipeAktif}?search=`;
            if (tipeAktif === 'komik') url += `&type=${filterTipeAktif}&genre=${filterGenreAktif}`;

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    let html = '';
                    if (!data || data.length === 0) {
                        html = stateMsg('empty', 'Tidak ada ekstensi ditemukan.');
                    } else {
                        data.forEach(item => {
                            const info      = item.version ? item.version : item.site;
                            const logo      = `https://ui-avatars.com/api/?name=${encodeURIComponent(item.name.charAt(0))}&background=1a1a2e&color=a78bfa&size=256&bold=true`;
                            const typeBadge = tipeAktif === 'komik' ? getBadgeTipe(item.type) : '';
                            const genres    = (item.genres && item.genres.length > 0) ? item.genres.slice(0,3).join(' · ') : '';
                            html += `
                            <div class="card" style="background-image:url('${logo}')" onclick="bukaEkstensi('${item.name}')">
                                <div class="card-overlay">
                                    ${typeBadge}
                                    <div class="card-title">${item.name}</div>
                                    <div class="card-meta">${info} &middot; ${item.lang.toUpperCase()}</div>
                                    ${genres ? `<div class="card-genre">${genres}</div>` : ''}
                                </div>
                            </div>`;
                        });
                    }
                    rak.innerHTML = html;
                })
                .catch(() => {
                    rak.innerHTML = stateMsg('error', 'Gagal terhubung ke server.');
                });
        }

        function getBadgeTipe(type) {
            const map = {
                manga:  { label: 'Manga',  cls: 'badge--manga'  },
                manhwa: { label: 'Manhwa', cls: 'badge--manhwa' },
                manhua: { label: 'Manhua', cls: 'badge--manhua' },
                comics: { label: 'Comics', cls: 'badge--comics' }
            };
            const t = map[type] || { label: type || 'Manga', cls: '' };
            return `<div class="type-badge ${t.cls}"><span class="dot"></span>${t.label}</div>`;
        }

        // ============================================================
        // 2. CHIPS FILTER
        // ============================================================
        function setFilterTipe(chipEl) {
            document.querySelectorAll('#chips-tipe .chip').forEach(c => c.classList.remove('active'));
            chipEl.classList.add('active');
            filterTipeAktif  = chipEl.dataset.value;
            filterGenreAktif = 'all';
            resetChips('chips-genre');
            muatDaftarEkstensi();
        }

        function setFilterGenre(chipEl) {
            document.querySelectorAll('#chips-genre .chip').forEach(c => c.classList.remove('active'));
            chipEl.classList.add('active');
            filterGenreAktif = chipEl.dataset.value;
            muatDaftarEkstensi();
        }

        function muatChipsGenre() {
            fetch('api/komik?action=genres')
                .then(r => r.json())
                .then(genres => {
                    if (!genres || genres.length === 0) return;
                    const container = document.getElementById('chips-genre');
                    container.innerHTML = '<button class="chip active" data-value="all" onclick="setFilterGenre(this)">Semua Genre</button>';
                    genres.forEach(g => {
                        const btn = document.createElement('button');
                        btn.className     = 'chip';
                        btn.dataset.value = g;
                        btn.textContent   = g;
                        btn.onclick       = function() { setFilterGenre(this); };
                        container.appendChild(btn);
                    });
                    document.getElementById('area-filter-genre').style.display = 'block';
                })
                .catch(() => {
                    document.getElementById('area-filter-genre').style.display = 'none';
                });
        }

        // ============================================================
        // 3. BUKA EKSTENSI
        // ============================================================
        function bukaEkstensi(namaEkstensi) {
            namaEkstensiAktif = namaEkstensi;
            document.getElementById('area-hero').style.display          = 'none';
            document.getElementById('area-pencarian').style.display     = 'flex';
            document.getElementById('area-filter-tipe').style.display   = 'none';
            document.getElementById('area-filter-browse').style.display = 'block';
            document.getElementById('konten-dinamis').innerHTML         = '<div class="grid" id="rak-konten"></div>';

            const headerTitle = document.getElementById('app-title');
            headerTitle.innerHTML    = `<span class="back-arrow">←</span> ${namaEkstensi}`;
            headerTitle.style.cursor = 'pointer';
            headerTitle.onclick      = () => ubahTipe(tipeAktif);

            document.getElementById('input-keyword').value = '';
            filterBrowseAktif = 'all';
            document.querySelectorAll('#chips-browse-genre .chip').forEach(c => c.classList.toggle('active', c.dataset.value === 'all'));

            eksekusiAmbilAPI('');
        }

        function setFilterBrowse(chipEl) {
            document.querySelectorAll('#chips-browse-genre .chip').forEach(c => c.classList.remove('active'));
            chipEl.classList.add('active');
            filterBrowseAktif = chipEl.dataset.value;
            renderHasilBrowse(dataBrowseSaatIni);
        }

        function pemicuCariManga() {
            eksekusiAmbilAPI(document.getElementById('input-keyword').value);
        }

        document.getElementById('input-keyword').addEventListener('keypress', e => {
            if (e.key === 'Enter') pemicuCariManga();
        });

        // ============================================================
        // 4. SEARCH
        // ============================================================
        function eksekusiAmbilAPI(keyword) {
            const rak = document.getElementById('rak-konten');
            rak.innerHTML = stateMsg('loading', 'Mencari komik...');

            fetch('api/scrape?search=' + encodeURIComponent(keyword) +
                  '&type=' + encodeURIComponent(filterTipeAktif) +
                  '&genre=' + encodeURIComponent(filterBrowseAktif))
                .then(r => r.json())
                .then(data => {
                    dataBrowseSaatIni = data || [];
                    bangunChipsBrowseGenre(dataBrowseSaatIni);
                    renderHasilBrowse(dataBrowseSaatIni);
                })
                .catch(err => console.error(err));
        }

        function bangunChipsBrowseGenre(data) {
            const genreSet = new Set();
            data.forEach(komik => { if (komik.genres) komik.genres.forEach(g => genreSet.add(g)); });

            const container = document.getElementById('chips-browse-genre');
            container.innerHTML = '<button class="chip active" data-value="all" onclick="setFilterBrowse(this)">Semua</button>';
            [...genreSet].sort().forEach(g => {
                const btn = document.createElement('button');
                btn.className     = 'chip';
                btn.dataset.value = g;
                btn.textContent   = g;
                btn.onclick       = function() { setFilterBrowse(this); };
                container.appendChild(btn);
            });
        }

        function renderHasilBrowse(data) {
            const rak = document.getElementById('rak-konten');
            const filtered = (filterBrowseAktif === 'all')
                ? data
                : data.filter(k => k.genres && k.genres.includes(filterBrowseAktif));

            if (!filtered || filtered.length === 0) {
                rak.innerHTML = stateMsg('empty', 'Tidak ada komik ditemukan.');
                return;
            }

            let html = '';
            filtered.forEach(komik => {
                const genre = (komik.genres && komik.genres.length > 0) ? komik.genres.join(' · ') : 'Manga';
                const safeJudul = komik.judul.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeUrl = (komik.urlTarget || '').replace(/'/g, "\\'");
                
                html += `
                <div class="card" style="background-image:url('${komik.gambarSampul}')" onclick="bukaDetailManga(${komik.malId}, '${safeUrl}')">
                    <div class="card-overlay">
                        <div class="card-title">${komik.judul}</div>
                        <div class="card-genre">${genre}</div>
                        <button class="save-btn"
                            onclick="event.stopPropagation(); tambahKeLibrary('${safeUrl}','${safeJudul}','${komik.gambarSampul}','manga')">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                            Simpan ke Library
                        </button>
                    </div>
                </div>`;
            });
            rak.innerHTML = html;
        }

        // ============================================================
        // 5. DETAIL MANGA + TOMBOL LIBRARY
        // ============================================================
        function bukaDetailManga(malId, mangaUrl, lang) {
            malIdDetailAktif   = malId;
            mangaIdDetailAktif = mangaUrl || String(malId);
            filterBahasaAktif = lang || 'all';

            document.getElementById('konten-dinamis').innerHTML = stateMsg('loading', 'Memuat detail...');
            document.getElementById('area-pencarian').style.display     = 'none';
            document.getElementById('area-filter-browse').style.display = 'none';
            document.getElementById('menu-utama').style.display         = 'none';
            document.getElementById('area-filter-tipe').style.display   = 'none';
            document.getElementById('area-hero').style.display          = 'none';

            const headerTitle = document.getElementById('app-title');
            headerTitle.innerHTML    = '<span class="back-arrow">←</span> Kembali';
            headerTitle.style.cursor = 'pointer';
            headerTitle.onclick      = () => bukaEkstensi(namaEkstensiAktif);

            fetch(`api/detail?malId=${malId}&lang=${filterBahasaAktif}`)
                .then(r => r.json())
                .then(komik => {
                    if (komik.error) {
                        document.getElementById('konten-dinamis').innerHTML = stateMsg('error', `Error: ${komik.error}`);
                        return;
                    }

                    dataMangaSaatIni = komik;
                    headerTitle.innerHTML = `<span class="back-arrow">←</span> ${komik.judul}`;

                    const synopsis = (komik.synopsis && komik.synopsis.trim() !== '') ? komik.synopsis : 'Sinopsis tidak tersedia.';

                    let chapterHTML = '';
                    if (!komik.chapters || komik.chapters.length === 0) {
                        chapterHTML = stateMsg('empty', `Belum ada chapter${filterBahasaAktif !== 'all' ? ' untuk bahasa ini' : ''}.`);
                    } else {
                        komik.chapters.forEach(ch => {
                            const langBadge = (filterBahasaAktif === 'all' && ch.translatedLanguage)
                                ? `<span class="lang-badge lang-${ch.translatedLanguage}">${ch.translatedLanguage.toUpperCase()}</span>` : '';
                            chapterHTML += `
                            <div class="chapter-item" onclick="bukaRuangBaca('${ch.id}')">
                                <div>
                                    <div class="chapter-num">Chapter ${ch.number} ${langBadge}</div>
                                    <div class="chapter-title-sub">${ch.title}</div>
                                </div>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                            </div>`;
                        });
                    }

                    const filterHTML = `
                    <div class="lang-filter">
                        <button class="lang-btn ${filterBahasaAktif === 'all' ? 'active' : ''}" onclick="gantiFilterBahasa('all')">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Semua
                        </button>
                        <button class="lang-btn ${filterBahasaAktif === 'id'  ? 'active' : ''}" onclick="gantiFilterBahasa('id')">
                            <span class="lang-badge lang-id">ID</span>Indonesia
                        </button>
                        <button class="lang-btn ${filterBahasaAktif === 'en'  ? 'active' : ''}" onclick="gantiFilterBahasa('en')">
                            <span class="lang-badge lang-en">EN</span>English
                        </button>
                    </div>`;

                    // Tombol library
                    const safeJudul = komik.judul.replace(/'/g, "\\'");
                    const safeCover = komik.gambarSampul.replace(/'/g, "\\'");
                    const safeId    = mangaIdDetailAktif.replace(/'/g, "\\'");

                    const tombolLibrary = statusLoginAktif.loggedIn
                        ? `<button id="btn-tambah-library"
                                onclick="tambahKeLibrary('${safeId}','${safeJudul}','${safeCover}','manga')"
                                class="btn-library-detail">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                                + Tambah ke Library
                           </button>`
                        : `<button onclick="window.location.href='login.html'" class="btn-library-detail" style="background:#444;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                                Login untuk simpan
                           </button>`;
                    
                    const tombolDownloaded = statusLoginAktif.loggedIn
                        ? `<button id="btn-tandai-downloaded"

        // 6. RUANG BACA
        // ============================================================
        function bukaRuangBaca(chapterId) {
            document.getElementById('konten-dinamis').innerHTML = stateMsg('loading', 'Memuat chapter...');

            const headerTitle = document.getElementById('app-title');
            headerTitle.innerHTML    = '<span class="back-arrow">←</span> Kembali ke Detail';
            headerTitle.style.cursor = 'pointer';
            headerTitle.onclick      = () => bukaDetailManga(malIdDetailAktif, mangaIdDetailAktif, filterBahasaAktif);

            const daftarChapter = (dataMangaSaatIni.chapters || []);
            const idxAktif      = daftarChapter.findIndex(c => c.id === chapterId);
            const chapterSaatIni = idxAktif >= 0 ? daftarChapter[idxAktif] : null;
            const chapterBerikut  = idxAktif > 0 ? daftarChapter[idxAktif - 1] : null;
            const chapterSebelum  = idxAktif >= 0 && idxAktif < daftarChapter.length - 1 ? daftarChapter[idxAktif + 1] : null;

            const iconPrev = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
            const iconNext = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
            const iconList = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>';

            const toolbarHTML = `
            <div class="reader-toolbar">
                <button class="reader-nav-btn" ${chapterSebelum ? `onclick="bukaRuangBaca('${chapterSebelum.id}')"` : 'disabled'}>${iconPrev}Sebelumnya</button>
                <button class="reader-nav-btn" onclick="bukaDetailManga(malIdDetailAktif, mangaIdDetailAktif, filterBahasaAktif)">${iconList}Daftar Chapter</button>
                <button class="reader-nav-btn" ${chapterBerikut ? `onclick="bukaRuangBaca('${chapterBerikut.id}')"` : 'disabled'}>Selanjutnya${iconNext}</button>
            </div>
            <span class="reader-chapter-label">${chapterSaatIni ? 'Chapter ' + chapterSaatIni.number : ''}</span>`;

            fetch('api/read?chapterId=' + chapterId)
                .then(r => r.json())
                .then(pages => {
                    let html = '';
                    pages.forEach((page, i) => {
                        html += `<img class="reader-page" src="${page.imageUrl}" loading="lazy" data-idx="${i}">`;
                    });
                    const endHTML = `
                    <div class="reader-end">
                        <p class="reader-end-label">Akhir chapter</p>
                        <div class="reader-toolbar" style="position:static;background:transparent;border:none;backdrop-filter:none;">
                            <button class="reader-nav-btn" ${chapterSebelum ? `onclick="bukaRuangBaca('${chapterSebelum.id}')"` : 'disabled'}>${iconPrev}Sebelumnya</button>
                            <button class="reader-nav-btn" onclick="bukaDetailManga(malIdDetailAktif, mangaIdDetailAktif, filterBahasaAktif)">${iconList}Daftar Chapter</button>
                            <button class="reader-nav-btn" ${chapterBerikut ? `onclick="bukaRuangBaca('${chapterBerikut.id}')"` : 'disabled'}>Selanjutnya${iconNext}</button>
                        </div>
                    </div>`;
                    document.getElementById('konten-dinamis').innerHTML =
                        `<div class="reader-progress"><div class="reader-progress-bar" id="reader-progress-bar"></div></div>${toolbarHTML}<div class="reader-wrap">${html}${endHTML}</div>`;
                    window.scrollTo(0, 0);
                    pasangPelacakProgresReader();
                })
                .catch(() => {
                    document.getElementById('konten-dinamis').innerHTML = stateMsg('error', 'Chapter gagal dimuat.');
                });
        }

        function pasangPelacakProgresReader() {
            const bar = document.getElementById('reader-progress-bar');
            if (!bar) return;
            const onScroll = () => {
                const scrollable = document.documentElement.scrollHeight - window.innerHeight;
                const persen = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
                bar.style.width = Math.min(100, Math.max(0, persen)) + '%';
            };
            window.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
        }

                        </tr>`;
                    });
                    html += '</tbody></table></div>';
                    wadah.innerHTML = html;
                })
                .catch(() => { wadah.innerHTML = stateMsg('error', 'Gagal memuat data user.'); });
        }

        function hapusUserAdmin(id) {
            if (!confirm('Yakin mau hapus user ini?')) return;
            const formData = new URLSearchParams();
            formData.append('id', id);
            fetch('api/admin', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => { if (data.status === 'success') bukaPanelAdmin(); else alert(data.message || 'Gagal.'); })
                .catch(() => alert('Gagal terhubung ke server.'));
        }

        // ============================================================
        // INIT
        // ============================================================
        document.getElementById('konten-dinamis').innerHTML = '<div class="grid" id="rak-konten"></div>';
        ubahTipe('komik');
        cekStatusLogin();
    </script>
    <script src="js/history.js"></script>
</body>
</html>
