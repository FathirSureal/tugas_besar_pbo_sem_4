<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeoYomi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .login-box h2 {
            margin: 0 0 20px 0;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            background-color: #2c2c2c;
            color: white;
            box-sizing: border-box;
            font-size: 0.95em;
        }
        .login-box input:focus {
            outline: 2px solid #8ab4f8;
        }
        .login-box button.submit-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background-color: #8ab4f8;
            color: #121212;
            font-weight: bold;
            font-size: 1em;
            border: none;
            cursor: pointer;
        }
        .login-box button.submit-btn:hover {
            background-color: #6f9ee8;
        }
        .toggle-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85em;
            color: #aaa;
        }
        .toggle-text a {
            color: #8ab4f8;
            cursor: pointer;
            text-decoration: underline;
        }
        .pesan {
            text-align: center;
            font-size: 0.85em;
            margin-bottom: 12px;
            min-height: 18px;
        }
        .pesan.error { color: #e74c3c; }
        .pesan.success { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            <h2 id="judul-form">Login NeoYomi</h2>

            <div class="pesan" id="pesan"></div>

            <input type="text" id="input-username" placeholder="Username">
            <input type="password" id="input-password" placeholder="Password">

            <button class="submit-btn" id="btn-submit" onclick="submitForm()">Login</button>

            <div class="toggle-text">
                <span id="toggle-label">Belum punya akun?</span>
                <a onclick="toggleMode()" id="toggle-link">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script>
        let modeRegister = false;

        function toggleMode() {
            modeRegister = !modeRegister;

            document.getElementById('judul-form').innerText   = modeRegister ? 'Daftar Akun Baru' : 'Login NeoYomi';
            document.getElementById('btn-submit').innerText   = modeRegister ? 'Daftar' : 'Login';
            document.getElementById('toggle-label').innerText = modeRegister ? 'Sudah punya akun?' : 'Belum punya akun?';
            document.getElementById('toggle-link').innerText  = modeRegister ? 'Login di sini' : 'Daftar di sini';
            tampilkanPesan('', '');
        }

        function tampilkanPesan(teks, tipe) {
            const el = document.getElementById('pesan');
            el.innerText = teks;
            el.className = 'pesan ' + tipe;
        }

        function submitForm() {
            const username = document.getElementById('input-username').value.trim();
            const password = document.getElementById('input-password').value;

            if (!username || !password) {
                tampilkanPesan('Username dan password wajib diisi', 'error');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('action', modeRegister ? 'register' : 'login');
            formData.append('username', username);
            formData.append('password', password);

            fetch('api/login', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        if (modeRegister) {
                            tampilkanPesan('Akun berhasil dibuat! Silakan login.', 'success');
                            toggleMode();
                        } else {
                            // Login berhasil -> kembali ke halaman utama
                            window.location.href = 'index.html';
                        }
                    } else {
                        tampilkanPesan(data.message || 'Terjadi kesalahan', 'error');
                    }
                })
                .catch(() => tampilkanPesan('Gagal terhubung ke server', 'error'));
        }

        document.getElementById('input-password').addEventListener('keypress', e => {
            if (e.key === 'Enter') submitForm();
        });

        // Kalau sudah login, langsung lempar ke index.html
        fetch('api/login')
            .then(r => r.json())
            .then(data => {
                if (data.loggedIn) window.location.href = 'index.html';
            })
            .catch(() => {});
    </script>
</body>
</html>
