<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NeoYomi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg-deep:       #08080c;
            --bg-base:       #0e0e14;
            --bg-card:       #16161e;
            --bg-raised:     #1d1d28;
            --border:        rgba(167,139,250,0.12);
            --border-h:      rgba(167,139,250,0.30);
            --accent:        #a78bfa;
            --accent-dim:    #7c5cbf;
            --accent-bright: #c4b1ff;
            --accent-glow:   rgba(167,139,250,0.15);
            --accent-2:      #f5c873;
            --text-1:        #f2f2f7;
            --text-2:        #92929f;
            --text-3:        #56566c;
            --red:           #e05a5a;
            --ease:          cubic-bezier(0.22, 1, 0.36, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-1);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ── Canvas partikel ── */
        #wave-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Split layout ── */
        .scene {
            display: grid;
            grid-template-columns: 1fr 420px;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* ── LEFT panel ── */
        .panel-left {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 52px;
        }

        /* Proyektor glow di background */
        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 700px 800px at 20% 60%, rgba(167,139,250,0.09), transparent 65%),
                radial-gradient(ellipse 400px 300px at 75% 10%, rgba(245,200,115,0.05), transparent 55%);
            pointer-events: none;
            z-index: 1;
        }

        /* Grid lines */
        .grid-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background-image:
                linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.5) 25%, rgba(0,0,0,0.5) 75%, transparent 100%);
        }

        .panel-left-inner {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ── Logo ── */
        .logo-mark {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
            user-select: none;
            animation: fadeIn 0.6s var(--ease) both;
        }
        .logo-neo  { color: var(--accent); }
        .logo-yomi { color: var(--text-1); }

        /* ── Headline ── */
        .panel-headline {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .headline-eyebrow {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent-2);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideRight 0.7s 0.2s var(--ease) both;
        }
        .eyebrow-line {
            display: inline-block;
            width: 28px;
            height: 1px;
            background: var(--accent-2);
            transform: scaleX(0);
            transform-origin: left;
            animation: lineGrow 0.6s 0.5s var(--ease) forwards;
        }

        .headline-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.4rem, 4vw, 3.6rem);
            line-height: 1.06;
            letter-spacing: -0.03em;
            color: var(--text-1);
            margin-bottom: 22px;
            text-shadow: 0 2px 40px rgba(0,0,0,0.8);
        }
        .headline-title em {
            font-style: normal;
            color: var(--accent);
        }
        .headline-title .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(28px);
        }

        .headline-sub {
            font-size: 0.88rem;
            color: var(--text-2);
            line-height: 1.7;
            max-width: 340px;
            animation: fadeUp 0.7s 0.9s var(--ease) both;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }

        /* ── Bottom stats ── */
        .panel-bottom {
            display: flex;
            align-items: center;
            gap: 14px;
            animation: fadeIn 0.7s 1.2s var(--ease) both;
        }
        .panel-stat { font-size: 0.72rem; color: var(--text-3); }
        .panel-stat strong {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            color: var(--text-2);
            letter-spacing: -0.01em;
        }
        .stat-divider { width: 1px; height: 28px; background: var(--border); }

        /* ── RIGHT panel — form ── */
        .panel-right {
            background: rgba(22,22,30,0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(167,139,250,0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 56px 44px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s 0.1s both;
        }

        .panel-right::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent) 40%, var(--accent-2) 70%, transparent);
            animation: fadeIn 1s 0.6s both;
        }
        .panel-right::after {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(167,139,250,0.07), transparent 70%);
            pointer-events: none;
        }

        .form-inner { position: relative; z-index: 1; }

        .form-heading { margin-bottom: 32px; animation: fadeUp 0.6s 0.3s var(--ease) both; }
        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -0.01em;
            margin-bottom: 6px;
            transition: opacity 0.25s, transform 0.25s var(--ease);
        }
        .form-desc {
            font-size: 0.82rem;
            color: var(--text-3);
            transition: opacity 0.25s, transform 0.25s var(--ease);
        }

        /* ── Fields ── */
        .field-wrap { margin-bottom: 16px; animation: fadeUp 0.6s var(--ease) both; }
        .field-wrap:nth-child(1) { animation-delay: 0.45s; }
        .field-wrap:nth-child(2) { animation-delay: 0.55s; }

        .field-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 7px;
            transition: color 0.2s;
        }
        .field-wrap:focus-within .field-label { color: var(--accent); }

        .field-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(29,29,40,0.7);
            border: 1px solid rgba(167,139,250,0.12);
            border-radius: 8px;
            color: var(--text-1);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.18s var(--ease), background 0.18s, box-shadow 0.18s;
            appearance: none;
        }
        .field-input::placeholder { color: var(--text-3); }
        .field-input:focus {
            outline: none;
            border-color: rgba(167,139,250,0.5);
            background: rgba(31,31,46,0.9);
            box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
        }

        /* ── Pesan ── */
        .pesan {
            font-size: 0.8rem;
            min-height: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.25s, transform 0.25s var(--ease);
        }
        .pesan.show { opacity: 1; transform: translateY(0); }
        .pesan.error   { color: var(--red); }
        .pesan.success { color: #4ade80; }
        .pesan.error::before, .pesan.success::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .pesan.error::before   { background: var(--red); }
        .pesan.success::before { background: #4ade80; }

        /* ── Button ── */
        .btn-submit {
            width: 100%;
            padding: 13px;
            border-radius: 8px;
            background: var(--accent);
            color: #0a0a10;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.88rem;
            border: none;
            cursor: pointer;
            margin-top: 6px;
            margin-bottom: 24px;
            letter-spacing: 0.01em;
            animation: fadeUp 0.6s 0.65s var(--ease) both;
            position: relative;
            overflow: hidden;
            transition: background 0.15s, transform 0.12s var(--ease), box-shadow 0.15s;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
            transform: translateX(-100%);
        }
        .btn-submit:hover {
            background: var(--accent-bright);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(167,139,250,0.3);
        }
        .btn-submit:hover::after {
            transform: translateX(100%);
            transition: transform 0.5s ease;
        }
        .btn-submit:active  { transform: translateY(0); box-shadow: none; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ── Toggle ── */
        .toggle-row {
            text-align: center;
            font-size: 0.81rem;
            color: var(--text-2);
            animation: fadeIn 0.6s 0.75s both;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: inherit;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: rgba(167,139,250,0.35);
            transition: color 0.15s, text-decoration-color 0.15s;
        }
        .toggle-btn:hover { color: var(--accent-bright); text-decoration-color: var(--accent-bright); }

        /* ── Keyframes ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes lineGrow {
            from { transform: scaleX(0); }
            to   { transform: scaleX(1); }
        }

        /* ── Mobile ── */
        @media (max-width: 720px) {
            body { overflow: auto; }
            .scene { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .panel-left { padding: 32px 28px 28px; min-height: 240px; }
            .headline-title { font-size: 2rem; }
            .panel-stat, .stat-divider { display: none; }
            .panel-right { border-left: none; border-top: 1px solid var(--border); padding: 40px 28px 48px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
            .headline-title .word { opacity: 1; transform: none; }
            .eyebrow-line { transform: scaleX(1); }
        }
    </style>
</head>
<body>

<canvas id="wave-canvas"></canvas>

<div class="scene">

    <!-- LEFT -->
    <div class="panel-left">
        <div class="grid-lines"></div>
        <div class="panel-left-inner">

            <div class="logo-mark">
                <span class="logo-neo">Neo</span><span class="logo-yomi">Yomi</span>
            </div>

            <div class="panel-headline">
                <div class="headline-eyebrow">
                    <span class="eyebrow-line"></span>
                    Baca tanpa batas
                </div>
                <h1 class="headline-title" id="headline-title">
                    Cerita yang hidup di setiap panel.
                </h1>
                <p class="headline-sub">
                    Ribuan judul manga, manhwa, dan manhua menunggu kamu — dalam satu tempat.
                </p>
            </div>

            <div class="panel-bottom">
                <div class="panel-stat"><strong>10K+</strong>Judul tersedia</div>
                <div class="stat-divider"></div>
                <div class="panel-stat"><strong>3</strong>Bahasa konten</div>
                <div class="stat-divider"></div>
                <div class="panel-stat"><strong>Gratis</strong>Baca sekarang</div>
            </div>

        </div>
    </div>

    <!-- RIGHT -->
    <div class="panel-right">
        <div class="form-inner">

            <div class="form-heading">
                <div class="form-title" id="judul-form">Selamat datang kembali</div>
                <div class="form-desc"  id="form-desc">Masuk untuk melanjutkan membaca</div>
            </div>

            <div class="pesan" id="pesan"></div>

            <div class="field-wrap">
                <label class="field-label" for="input-username">Username</label>
                <input class="field-input" type="text" id="input-username" placeholder="username kamu" autocomplete="username">
            </div>
            <div class="field-wrap">
                <label class="field-label" for="input-password">Password</label>
                <input class="field-input" type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn-submit" id="btn-submit" onclick="submitForm()">Masuk</button>

            <div class="toggle-row">
                <span id="toggle-label">Belum punya akun?</span>
                <button class="toggle-btn" onclick="toggleMode()" id="toggle-link"> Daftar di sini</button>
            </div>

        </div>
    </div>

</div>

<script>
/* ══════════════════════════════════════
   WAVE PARTICLES — Terbang bebas
══════════════════════════════════════ */
(function () {
    const canvas = document.getElementById('wave-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, ptcls = [];

    /* Tiap grup warna punya karakteristik arus sendiri */
    const GROUPS = [
        {
            colors: [[167, 139, 250], [196, 177, 255], [124,  92, 191]], // ungu
            vxRange: [0.05, 0.35],
            vyRange: [0.2, 0.65],
            count: 0,
        },
        {
            colors: [[245, 200, 115], [255, 218, 150]], // kuning
            vxRange: [-0.25, 0.15],
            vyRange: [0.25, 0.75],
            count: 0,
        },
        {
            colors: [[59, 130, 246], [37, 99, 235]], // biru tua
            vxRange: [-0.15, 0.25],
            vyRange: [0.2, 0.7],
            count: 0,
        },
    ];

    function rand(a, b) { return Math.random() * (b - a) + a; }
    function pick(arr)  { return arr[Math.floor(Math.random() * arr.length)]; }

    function makeParticle(group) {
        const [r, g, b] = pick(group.colors);
        return {
            x:       rand(0, W),
            y:       rand(0, H),
            vy:      rand(...group.vyRange),
            vx:      rand(...group.vxRange),
            r:       rand(0.5, 3.2),  // ukuran lebih beragam
            alpha:   rand(0.12, 0.55),  // alpha lebih tinggi
            baseAlpha: rand(0.12, 0.55),
            wAmp:    rand(12, 45),  // amplitudo gelombang lebih besar
            wFreq:   rand(0.0005, 0.0025),
            wPhase:  rand(0, Math.PI * 2),
            dAmp:    rand(3, 15),  // drift lebih besar
            dFreq:   rand(0.0002, 0.0008),
            dPhase:  rand(0, Math.PI * 2),
            tPhase:  rand(0, Math.PI * 2),
            tSpd:    rand(0.008, 0.035),
            /* Rotasi/swirl motion tambahan */
            swirl:   rand(0.0001, 0.0008),
            swirlAmp: rand(15, 45),
            /* Pulse kecil */
            pulse:   rand(0, Math.PI * 2),
            pulsSpd: rand(0.01, 0.03),
            cr: r, cg: g, cb: b,
        };
    }

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        
        ptcls = [];
        GROUPS.forEach(group => {
            const count = Math.floor((W * H) / 12000); // lebih banyak partikel
            group.count = Math.min(count, 220);  // max 220 per grup (total 660)
            for (let i = 0; i < group.count; i++) {
                ptcls.push(makeParticle(group));
            }
        });
    }

    function tick(ts) {
        ctx.clearRect(0, 0, W, H);

        for (const p of ptcls) {
            p.y -= p.vy;
            p.x += p.vx;
            
            /* Wave oscillation */
            const wx = Math.sin(ts * p.wFreq + p.wPhase) * p.wAmp;
            const dy = Math.sin(ts * p.dFreq + p.dPhase) * p.dAmp;
            
            /* Swirl motion — partikel berputar keliling */
            const swirlX = Math.cos(ts * p.swirl) * p.swirlAmp;
            const swirlY = Math.sin(ts * p.swirl) * p.swirlAmp;
            
            /* Twinkle */
            p.tPhase += p.tSpd;
            let a = p.alpha * (0.4 + 0.6 * Math.sin(p.tPhase));
            
            /* Pulse radius */
            p.pulse += p.pulsSpd;
            const pulseRad = p.r * (0.8 + 0.4 * Math.sin(p.pulse));
            
            /* Fade di atas */
            const fadeTop = Math.max(0, Math.min(1, p.y / (H * 0.15)));
            a *= fadeTop;

            /* Draw glow/blur effect */
            ctx.beginPath();
            ctx.arc(p.x + wx + swirlX, p.y + dy + swirlY, pulseRad + 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${(a * 0.3).toFixed(3)})`;
            ctx.fill();

            /* Draw main particle */
            ctx.beginPath();
            ctx.arc(p.x + wx + swirlX, p.y + dy + swirlY, pulseRad, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${(a).toFixed(3)})`;
            ctx.fill();

            if (p.y < -20 || p.x < -40 || p.x > W + 40) {
                p.y     = H + rand(20, 100);
                p.x     = rand(0, W);
                p.alpha = p.baseAlpha;
            }
        }

        requestAnimationFrame(tick);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(tick);
})();

/* ── Word entrance ── */
(function () {
    const el   = document.getElementById('headline-title');
    const html = el.innerHTML;
    el.innerHTML = html.replace(/\b(\w+)\b/g, '<span class="word">$1</span>');
    el.querySelectorAll('.word').forEach((w, i) => {
        setTimeout(() => {
            w.style.transition = 'opacity 0.5s cubic-bezier(0.22,1,0.36,1), transform 0.5s cubic-bezier(0.22,1,0.36,1)';
            w.style.opacity    = '1';
            w.style.transform  = 'translateY(0)';
        }, 300 + i * 90);
    });
})();

/* ── Form logic ── */
let modeRegister = false;

function toggleMode() {
    modeRegister = !modeRegister;
    const title = document.getElementById('judul-form');
    const desc  = document.getElementById('form-desc');
    [title, desc].forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; });
    setTimeout(() => {
        title.innerText = modeRegister ? 'Buat akun baru' : 'Selamat datang kembali';
        desc.innerText  = modeRegister ? 'Daftarkan dirimu untuk mulai membaca' : 'Masuk untuk melanjutkan membaca';
        [title, desc].forEach(el => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
    }, 200);
    document.getElementById('btn-submit').innerText   = modeRegister ? 'Daftar' : 'Masuk';
    document.getElementById('toggle-label').innerText = modeRegister ? 'Sudah punya akun?' : 'Belum punya akun?';
    document.getElementById('toggle-link').innerText  = modeRegister ? ' Login di sini' : ' Daftar di sini';
    document.getElementById('input-password').autocomplete = modeRegister ? 'new-password' : 'current-password';
    tampilkanPesan('', '');
    document.getElementById('input-username').focus();
}

function tampilkanPesan(teks, tipe) {
    const el = document.getElementById('pesan');
    el.innerText = teks;
    el.className = 'pesan' + (tipe ? ' ' + tipe + ' show' : '');
}

function submitForm() {
    const username = document.getElementById('input-username').value.trim();
    const password = document.getElementById('input-password').value;
    if (!username || !password) { tampilkanPesan('Username dan password wajib diisi', 'error'); return; }
    const btn = document.getElementById('btn-submit');
    btn.disabled  = true;
    btn.innerText = modeRegister ? 'Mendaftar...' : 'Masuk...';
    const fd = new URLSearchParams();
    fd.append('action',   modeRegister ? 'register' : 'login');
    fd.append('username', username);
    fd.append('password', password);
    fetch('api/login', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(data => {
            btn.disabled  = false;
            btn.innerText = modeRegister ? 'Daftar' : 'Masuk';
            if (data.status === 'success') {
                if (modeRegister) { tampilkanPesan('Akun berhasil dibuat! Silakan login.', 'success'); toggleMode(); }
                else window.location.href = 'index.html';
            } else {
                tampilkanPesan(data.message || 'Terjadi kesalahan', 'error');
            }
        })
        .catch(() => {
            btn.disabled  = false;
            btn.innerText = modeRegister ? 'Daftar' : 'Masuk';
            tampilkanPesan('Gagal terhubung ke server', 'error');
        });
}

document.getElementById('input-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
});

fetch('api/login')
    .then(r => r.json())
    .then(d => { if (d.loggedIn) window.location.href = 'index.html'; })
    .catch(() => {});
</script>
